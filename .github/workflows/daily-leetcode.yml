name: Daily LeetCode Solution

on:
  schedule:
    - cron: '55 18 * * *'  # 11:55 AM LA (PDT / UTC-7)
  workflow_dispatch:        # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate solution
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python .github/scripts/generate_solution.py

      - name: Commit and push
        run: |
          git config user.name "yzhuglhf"
          git config user.email "yingbing.zhu@hotmail.com"
          git add -A
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "$(cat /tmp/commit_msg.txt)"
            git push origin master
          fi
